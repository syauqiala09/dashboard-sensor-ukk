<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — SensorWatch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-header">
      <div class="brand-icon">🌡</div>
      <h1 class="brand-name login-title">SensorWatch</h1>
      <p class="login-subtitle">Silakan login untuk mengakses dashboard</p>
    </div>
    
    <form id="login-form" class="login-form">
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Masukkan username" required autofocus autocomplete="username" />
      </div>
      
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Masukkan password" required autocomplete="current-password" />
      </div>
      
      <div id="login-error" class="login-error" style="display: none;">Username atau password salah!</div>
      
      <button type="submit" class="btn-login">MASUK ➔</button>
    </form>
  </div>
  
  <script src="login.js"></script>
</body>
</html>
